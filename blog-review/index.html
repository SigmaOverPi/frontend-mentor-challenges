<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap');
    :root{
      --white: hsl(0, 0%, 100%);
      --yellow: hsl(47, 88%, 63%);
      --gray-500: hsl(0, 0%, 42%);
      --gray-950: hsl(0, 0%, 7%);
    }

    *{
      font-family: 'Figtree', sans-serif;
    }

    .heavy{
      font-weight: 800;
    }

    .normal{
      font-weight: 500;
    }

    .description{
      font-size: 16px;
      color: var(--gray-500);
    }

    body{
      background: var(--yellow);
      display: flex;
      gap: 10px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      text-align: left;
    }

    .card{
      width: 350px;
      height: 480px;
      padding: 20px;
      border: 1px solid var(--gray-950);
      border-radius: 15px;
      background: var(--white);
      display: flex;
      gap: 15px;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      box-shadow: 10px 10px var(--gray-950);
    }

    .img-container{
      width: 100%;
      height: 200px;
    }

    .img-container img{
      border-radius: 10px;
    }

    img{
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tag{
      width: 20%;
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 5px;
      background: var(--yellow);
    }
    
    .teacher{
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    .img-small{
      width: 30px;
    }

    .texts h2{
      transition: all 0.4s ease-in-out;
    }

    .texts h2:hover{
      cursor: pointer;
      color: var(--yellow);
    }

    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="card">
    <div class="img-container">
      <img src="assets/images/illustration-article.svg" alt="illustration-article-image">
    </div>
    <div class="tag heavy">Learning</div>
    <div class="info">
      <div class="date">Published 21 Dec 2023</div>
    <div class="texts">
      <h2 role="heading" class="heavy">HTML & CSS foundations</h2>
      <p class="description normal">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="teacher">
      <div class="img-small">
        <img src="assets/images/image-avatar.webp" alt="image-avatar">
      </div>
      <p class="name heavy">Greg Hooper</p>
    </div>
    </div>
  </div>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">SigmaOver</a>.
  </div>
</body>
</html>
