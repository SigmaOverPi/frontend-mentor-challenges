<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    
    :root{
      --green: hsl(75, 94%, 57%);
      --white: hsl(0, 0%, 100%);
      --gray-700: hsl(0, 0%, 20%);
      --gray-800: hsl(0, 0%, 12%);
      --gray-900: hsl(0, 0%, 8%);
    }

    body{
      background: var(--gray-900);
      color: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Inter", sans-serif;
    }

    p{
      font-size: 14px;
    }

    .card{
      aspect-ratio: 9 / 16;
      width: 260px;
      height: auto;
      background: var(--gray-800);
      padding: 20px;
      display: flex;
      gap: 15px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border-radius: 8px;
    }

    .user-img{
      border-radius: 100%;
      aspect-ratio: 1/1;
      width: 100px;
    }

    .heavy{
      font-weight: 700;
    }

    .medium{
      font-weight: 600;
    }

    .light{
      font-weight: 400;
    }

    .name{
      color: var(--white);
      margin-bottom: 10px;
    }

    .location{
      color: var(--green);
      margin-top: 0px;
    }

    .bio{
      color: var(--white);
    }

    .social-links{
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    
    .link{
      background: var(--gray-700);
      border-radius: 5px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      transition: all 0.4s ease-in-out;
    }
    .link:hover{
      cursor: pointer;
      background: var(--green);
      color: var(--gray-900);
    }

    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="card">
    <img src="assets/images/avatar-jessica.jpeg" alt="user-icon" class="user-img">
    <div class="texts">
      <h2 class="name heavy">Jessica Randall</h2>
      <p class="location medium">London, United Kingdom</p>
    </div>
    <p class="bio">"Front-end developer and avid reader."</p>
    <div class="social-links">
      <div class="link medium"><p>GitHub</p></div>
      <div class="link medium"><p>Frontend Mentor</p></div>
      <div class="link medium"><p>LinkedIn</p></div>
      <div class="link medium"><p>Twitter</p></div>
      <div class="link medium"><p>Instagram</p></div>
    </div>
  </div>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/SigmaOverPi">SigmaOverPi</a>.
  </div>
</body>
</html>
