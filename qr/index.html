<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    :root{
      --white: hsl(0, 0%, 100%);
      --slate-300: hsl(212, 45%, 89%);
      --slate-500: hsl(216, 15%, 48%);
      --slate-900: hsl(218, 44%, 22%);
    }

    *{
      font-family: 'Outfit', sans-serif;
    }

    body{
      background: var(--slate-300);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .heavy{
      font-weight: 700;
      color: var(--slate-900);
    }

    .light{
      font-weight: 400;
      color: var(--slate-500);
      font-size: 15px;
    }

    .card{
      display: flex;
      flex-direction: column;
      place-items: center flex-start;
      width: 290px;
      height: 470px;
      padding: 15px;
      border-radius: 15px;
      background: var(--white);
      text-align: center;
    }

    .qr-container{
      width: 100%;
      height: 300px;
    }

    .qr-container img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .texts{
      width: 95%;
    }


    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card">
    <div class="qr-container">
      <img src="images/image-qr-code.png" alt="qr">
    </div>

    <div class="texts">
      <h3 class="heavy">Improve your front-end skills by building projects</h3>

      <p class="light">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">SigmaOverPi</a>.
  </div>
</body>
</html>
